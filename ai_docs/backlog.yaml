  "stories": [
    {
      "id": "US-001",
      "title": "Side-by-side fork operation",
      "persona": "Gmux operator who still has upstream cmux installed and active.",
      "narrative": "As a Gmux user, I want Gmux to run beside cmux without collisions so I can evaluate and adopt the fork incrementally.",
      "why": "The fork is not credible if app launches, helper shims, remote state, or notifications still bind to cmux internals.",
      "acceptance_criteria": [
        "Gmux runtime identifiers are gmux-scoped.",
        "Running Gmux beside cmux does not clobber cmux state.",
        "Remaining coexistence gaps are explicit M0 backlog items."
      ],
      "epic_refs": [
        "EPIC-001"
      ],
      "task_refs": [
        "TASK-001",
        "TASK-002"
      ],
      "references": [
        "deep-research-report.md",
        "ai_docs/milestones/M0-fork-completion-and-spec-infrastructure.md"
      ],
      "doc": "ai_docs/stories/US-001-side-by-side-fork-operation.md"
    },
    {
      "id": "US-002",
      "title": "Separate Gmux distribution",
      "persona": "User installing or upgrading Gmux as a standalone product.",
      "narrative": "As a user, I want Gmux to install and update as its own product so I can keep it alongside cmux without replacing cmux tooling or release metadata.",
      "why": "A fork that still publishes cmux-branded DMGs, casks, or cleanup paths is operationally ambiguous.",
      "acceptance_criteria": [
        "Release packaging and download names reference Gmux.",
        "The CLI install flow produces gmux instead of overwriting cmux.",
        "Cleanup and zap logic target Gmux-owned state only."
      ],
      "epic_refs": [
